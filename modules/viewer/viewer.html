<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB - Visionneuse</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Fond sombre modale */
            color: var(--color-text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .viewer-modal-wrapper {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: var(--color-container);
            border-radius: 12px;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-lifted);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* En-tête */
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--color-container);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            box-shadow: var(--shadow-soft);
            z-index: 10;
        }
        
        .viewer-header h2 {
            margin: 0;
            font-family: var(--font-title);
            letter-spacing: 1px;
            color: var(--color-primary);
        }

        #btn-back {
            background: var(--color-background);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #btn-back:hover {
            background: var(--color-primary);
            color: #111;
            border-color: var(--color-primary);
        }

        /* Conteneur principal */
        .viewer-main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar pour Plan */
        .viewer-sidebar {
            width: 350px;
            background: var(--color-container);
            border-right: 1px solid var(--color-border);
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .viewer-sidebar.active {
            display: flex;
        }

        .viewer-sidebar h3 {
            margin-top: 0;
            color: var(--color-primary);
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 10px;
        }
        
        .viewer-notes {
            font-size: 0.95em;
            opacity: 0.8;
            margin-bottom: 20px;
            white-space: pre-wrap;
            background: var(--color-background);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }

        .exo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .exo-btn {
            background: var(--color-background);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exo-btn:hover {
            border-color: var(--color-primary);
        }

        .exo-btn.active {
            background: var(--color-primary);
            color: #111;
            border-color: var(--color-primary);
        }

        /* Zone de contenu */
        .viewer-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
            background: #111; /* Fond sombre pour faire ressortir le contenu */
        }

        /* Rendu Image (Playbook/Exo) */
        .scenes-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .scene-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--color-container);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            max-width: 90%;
        }

        .scene-image {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .scene-comment {
            margin-top: 15px;
            color: var(--color-text);
            font-size: 1.1em;
            text-align: center;
            max-width: 800px;
            white-space: pre-wrap;
        }

        /* Rendu PDF (Sheet) */
        .sheet-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
        }

        .a4-page {
            width: 794px;
            height: 1123px;
            background: white;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
            color: black;
            font-family: Arial, sans-serif;
            transform-origin: top center;
            margin-bottom: 30px;
        }
        
        .a4-element {
            position: absolute;
            pointer-events: none; /* Empêcher toute interaction dans le viewer */
        }
        .a4-element.drawing-wrapper { pointer-events: none !important; }
        
        /* Placeholder message */
        .empty-message {
            color: #fff;
            opacity: 0.5;
            font-size: 1.2em;
            display: none;
        }

        @media (max-width: 1024px) {
            .viewer-main {
                flex-direction: column;
            }
            .viewer-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                max-height: 30vh;
            }
        }
    </style>
</head>
<body>

    <div class="viewer-modal-wrapper">
        <div class="viewer-header">
            <div style="display:flex; gap:10px;">
                <button id="btn-back">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
                    Fermer
                </button>
                <a href="../../index.html" id="btn-home" style="background: var(--color-background); border: 1px solid var(--color-border); color: var(--color-text); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; display: flex; align-items: center; gap: 5px; text-decoration: none;">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
                    Accueil
                </a>
            </div>
            <h2 id="viewer-title">Visionneuse</h2>
            <div style="width: 150px;"></div> <!-- Spacer pour centrer le titre -->
        </div>

        <div class="viewer-main">
            <!-- Sidebar Plan -->
            <div class="viewer-sidebar" id="sidebar-plan">
                <h3 id="plan-title">Titre de la Séance</h3>
                <div class="viewer-notes" id="plan-notes" style="display:none;"></div>
                <div class="exo-list" id="plan-exo-list"></div>
            </div>

            <!-- Contenu Principal -->
            <div class="viewer-content">
                <div class="empty-message" id="empty-message">Veuillez sélectionner un exercice.</div>
                <div class="scenes-container" id="scenes-container"></div>
                <div class="sheet-container" id="sheet-container"></div>
            </div>
        </div>
    </div>

    <div id="hidden-render-zone" style="position: absolute; left: -9999px; top: -9999px; width: 560px; height: 300px; visibility: hidden;">
        <div id="court-background-container" style="position: relative; width: 100%; height: 100%; background: #BFA98D;">
            <svg id="court-svg" viewBox="0 0 280 150" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="width: 100%; height: 100%; display: block;">
                <rect x="0" y="0" width="280" height="150" fill="var(--color-primary)"/>
                <g class="court-lines" stroke="#212121" stroke-width="0.6" fill="none"><rect x="0" y="0" width="280" height="150"/><line x1="140" y1="0" x2="140" y2="150"/><rect x="0" y="50.5" width="58" height="49" /><path d="M 58 50.5 A 18 18 0 0 1 58 99.5" /><path d="M 0 6 L 29.1 6 A 67.5 67.5 0 0 1 29.1 144 L 0 144" /><rect x="222" y="50.5" width="58" height="49" /><path d="M 222 50.5 A 18 18 0 0 0 222 99.5" /><path d="M 280 6 L 250.9 6 A 67.5 67.5 0 0 0 250.9 144 L 280 144" /></g>
                <g class="center-court-logo">
                    <circle cx="140" cy="75" r="18" fill="var(--color-primary)" />
                    <circle class="court-lines" cx="140" cy="75" r="18" fill="none" stroke="#212121" stroke-width="0.6"/>
                    <text class="court-text-orb" x="140" y="76" font-family="Impact, 'Arial Black', sans-serif" font-size="15" fill="#212121" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.5">ORB</text>
                    <text class="court-text-crab" x="140" y="76" font-family="Impact, 'Arial Black', sans-serif" font-size="15" fill="#212121" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.5">CRAB</text>
                </g>
                <g class="court-lines" stroke="#212121" fill="none"><g transform="translate(15.75, 75)"><line x1="-3.75" y1="-9" x2="-3.75" y2="9" stroke-width="0.8"/><circle cx="0" cy="0" r="2.25" stroke-width="0.5"/><path d="M 0 -12.5 A 12.5 12.5 0 0 1 0 12.5" stroke-width="0.6"/></g><g transform="translate(264.25, 75)"><line x1="3.75" y1="-9" x2="3.75" y2="9" stroke-width="0.8"/><circle cx="0" cy="0" r="2.25" stroke-width="0.5"/><path d="M 0 -12.5 A 12.5 12.5 0 0 0 0 12.5" stroke-width="0.6"/></g></g>
            </svg>
            <canvas id="basketball-court" width="560" height="300" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;"></canvas>
        </div>
    </div>

    <script src="../../core/db.js"></script>
    <script src="../../core/state.js"></script>
    <script src="../../core/utils.js"></script>
    <script src="../board/renderer.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
