<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB - Planificateur</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="planner.css">
</head>
<body>

    <div id="planner-main-view">
        <header class="app-header">
            <div class="header-content" style="display: flex; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 20px;">
                <div style="display: flex; gap: 15px; align-items: center; margin-right: 15px;">
                    <button id="global-back-btn" class="btn-icon" style="padding: 0; background: transparent; border: none; cursor: pointer; color: var(--color-text-on-dark);" title="Retour">
                        <svg viewBox="0 0 24 24" style="width:28px; height:28px; fill:currentColor;"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg>
                    </button>
                    <a href="../../index.html" onclick="sessionStorage.clear()" class="btn-icon" style="padding: 0; display: flex; align-items: center; text-decoration: none; color: var(--color-text-on-dark);" title="Accueil">
                        <svg viewBox="0 0 24 24" style="width:28px; height:28px; fill:currentColor;"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
                    </a>
                </div>
                <h1 style="margin: 0; text-align: center; flex-grow: 1; padding-right: 86px;">ORB <span class="highlight">PLANIFICATEUR</span></h1>
            </div>
        </header>

        <main style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
            <div class="planner-header" style="display: flex; justify-content: space-between; align-items: center; background: var(--color-container); padding: 20px; border-radius: 12px; box-shadow: var(--shadow-soft); border: 1px solid var(--color-border); margin-bottom: 20px;">
                <h2 id="planner-view-title" style="margin: 0; font-family: var(--font-title); letter-spacing: 1px; display: flex; align-items: center; gap: 15px;">
                    <button id="btn-back-plan-folders" style="background: var(--color-background); border: 1px solid var(--color-border); color: var(--color-text); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; display: none; align-items: center; gap: 5px;">
                        <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
                        Retour
                    </button>
                    <span id="planner-title-text">Vos Dossiers de Séances</span>
                </h2>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-create-plan-folder" class="btn-primary" style="padding: 10px 20px; font-size: 1em; background: #111; color: var(--color-primary); border: 1px solid var(--color-primary);">+ Nouveau Dossier</button>
                </div>
            </div>
            <div id="planner-grid"></div>
        </main>
    </div>

    <div id="planner-editor-view" class="hidden" style="min-height: 100vh; display: flex; flex-direction: column;">
        
        <header class="app-header">
            <div class="header-content" style="display: flex; justify-content: space-between; align-items: center; max-width: 1500px; margin: 0 auto; width: 100%; padding: 0 20px;">
                <button id="plan-editor-cancel-btn" class="btn-icon" style="color: var(--color-primary);" title="Annuler et fermer">
                    <svg viewBox="0 0 24 24" style="width:28px;"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
                </button>
                <h1 id="editor-main-title" style="margin: 0;">NOUVELLE <span class="highlight">SÉANCE</span></h1>
                <button id="plan-editor-save-btn" class="btn-primary" style="padding: 10px 24px; font-size: 1.1em; display: flex; align-items: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" style="width:20px; fill:currentColor;"><path d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z"/></svg>
                    Sauvegarder
                </button>
            </div>
        </header>

        <main class="editor-main-layout">
            <div class="editor-left-panel">
                <div class="editor-card">
                    <h2 style="color: var(--color-primary); margin-top: 0; font-size: 1.2em;">Détails de la séance</h2>
                    <input type="text" id="plan-editor-name" class="premium-input" placeholder="Titre de la séance (ex: Focus Défense U15...)">
                    <textarea id="plan-editor-notes" class="premium-input" rows="3" placeholder="Objectifs, consignes générales, points d'attention..."></textarea>
                </div>

                <div class="editor-card" style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2 style="color: var(--color-primary); margin: 0; font-size: 1.2em;">Chronologie de l'entraînement</h2>
                        <span style="background: rgba(191,169,141,0.2); color: var(--color-primary); padding: 4px 12px; border-radius: 20px; font-weight: bold;"><span id="exo-count">0</span> Exercices</span>
                    </div>
                    <ul id="plan-playbooks-list" class="premium-list"></ul>
                </div>
            </div>

            <div class="editor-right-panel editor-card">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--color-border); padding-bottom: 15px; margin-bottom: 20px;">
                    <h2 id="planner-lib-title" style="color: var(--color-primary); margin: 0; font-size: 1.2em;">Dossiers</h2>
                    <button id="btn-planner-lib-back" class="btn-icon hidden" style="font-size:0.9em; display:flex; align-items:center; gap:5px;">
                        <svg viewBox="0 0 24 24" style="width:18px;"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" /></svg> Retour
                    </button>
                </div>
                
                <div id="plan-selector-filters" class="tag-filters hidden"></div>
                <input type="text" id="plan-selector-search" class="premium-input search-input hidden" placeholder="Rechercher un exercice...">
                <div id="plan-selector-list" class="premium-mini-grid"></div>
            </div>
        </main>
    </div>

    <!-- Modale Assignation Dossier -->
    <div id="assign-plan-modal" class="modal-overlay hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 3000; display: flex; justify-content: center; align-items: center;">
        <div class="centered-panel" style="background: var(--color-container); border-radius: 12px; width: 450px; max-width: 90vw; box-shadow: 0 10px 40px rgba(0,0,0,0.5); padding: 25px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--color-primary);">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); padding-bottom: 15px; margin-bottom: 20px;">
                <h3 id="assign-plan-title" style="margin: 0; font-size: 1.3em;">Classer la séance</h3>
                <button id="assign-plan-close-btn" class="btn-icon" style="background: transparent; border: none; cursor: pointer; color: var(--color-text); padding: 5px; transition: color 0.2s;"><svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: currentColor;"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg></button>
            </div>
            <div class="assignment-section" style="margin-bottom: 20px; background: var(--color-background); padding: 15px; border-radius: 8px; border: 1px solid var(--color-border);">
                <h4 style="margin-top: 0; margin-bottom: 10px; color: var(--color-primary); border-bottom: 1px solid var(--color-border); padding-bottom: 5px; display: flex; align-items: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:currentColor;"><path d="M10,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V8C22,6.89 21.1,6 20,6H12L10,4Z"/></svg>
                    Dossiers
                </h4>
                <div id="assign-plan-folders-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto;"></div>
            </div>
            <button id="btn-save-plan-assignment" class="btn-primary" style="width: 100%; padding: 12px; font-size: 1.1em; margin-top: 10px;">Sauvegarder le classement</button>
        </div>
    </div>

    <script src="../../core/db.js"></script>
    <script src="planner.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        if (localStorage.getItem('teamMode') === 'crab') document.body.classList.add('crab-mode');
    </script>
    <script src="../../core/sync.js"></script>
</body>
</html>
